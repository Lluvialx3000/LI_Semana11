<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>
        Hotel Cama Arena
    </title>
    <link
        rel="stylesheet"
        href="../styles/styles.css"
    >
</head>

<body>

    <header>

        <nav>

            <div class="logo">

                浮世絵
                <span>
                    Problema 11
                </span>

            </div>

            <div class="menu">
                <a href="../index.html" class="home-btn"> 🏯 Inicio </a>
            </div>
        </nav>
    </header>
    <section class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>
                Hotel Cama Arena
            </h1>
            <p>
                Sistema para calcular el cobro
                total por hospedaje en el hotel.
            </p>
            <div class="box">
                <label for="dias">
                    Días hospedado:
                </label>
                <br><br>
                <input
                    type="number"
                    id="dias"
                >
                <br><br><br>
                <label for="costo">
                    Costo por día:
                </label>
                <br><br>
                <input
                    type="number"
                    id="costo"
                >
                <br><br><br>
                <button
                    onclick="hotel()"
                    class="btn"
                >
                    Calcular Cobro
                </button>
                <br><br><br>
                <p id="resul">
                    Resultado
                </p>
            </div>
        </div>
    </section>
    <script
        src="../scripts/pagina11.js"
        defer
    ></script>
